  - source_id: ssa_national_baby_names
    name: SSA National Baby Names
    source_category: ssa_aggregate
    source_url: https://www.ssa.gov/oact/babynames/limits.html
    download_url: https://www.ssa.gov/oact/babynames/names.zip
    license: public_domain_or_us_gov
    access_method: download
    raw_storage_allowed: true
    structured_fields_available: true
    review_required: false
    display_authority: false
    allowed_outputs: [first]
    excluded_fields: [birth_year, sex, counts]
    retention:
      retain_raw_file: true
      persist_person_rows: false
      stream_only_fields: [name]
    notes: >-
      SSA provides national files for researchers and excludes names with fewer than five occurrences for privacy.
      SSA removes spaces and punctuation in names, so this source should confirm first-name existence but should not overwrite richer display forms from other sources.

