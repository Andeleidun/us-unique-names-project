  - source_id: nppes_npi_v2_individual_providers
    name: NPPES NPI Data Dissemination Version 2 Individual Providers
    source_category: modern_public_record_structured
    source_url: https://download.cms.gov/nppes/NPI_Files.html
    download_url: https://download.cms.gov/nppes/NPPES_Data_Dissemination_June_2026_V2.zip
    license: public_domain_or_us_gov_foia_disclosable
    access_method: download
    raw_storage_allowed: false
    structured_fields_available: true
    review_required: false
    display_authority: true
    allowed_outputs: [first, last]
    excluded_fields: [npi, addresses, phone_numbers, taxonomy, endpoints, practice_locations, organization_names, enumeration_dates]
    retention:
      retain_raw_file: false
      persist_person_rows: false
      stream_only_fields: [provider_first_name, provider_last_name, provider_middle_name_if_approved_later]
    notes: >-
      Phase 1 source only. Use Version 2 because CMS says it includes expanded First Name field lengths.
      The v0.1 release must not ingest this source until stream-and-discard controls are tested.
