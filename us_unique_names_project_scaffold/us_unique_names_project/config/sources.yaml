# Source registry for v0.1 baseline and near-term expansion.
# Public outputs may contain only deduplicated name strings and safe source-level metadata.
# Do not persist person-level context from future sources unless an approved policy explicitly permits it.

sources:
  - source_id: census_2020_first_names_by_sex
    name: 2020 Census First Names by Sex
    source_category: census_aggregate
    source_url: https://www.census.gov/topics/population/genealogy/data/2020_names.html
    download_url: https://www2.census.gov/topics/genealogy/2020surnames/Names2020_FirstNames_Sex.xlsx
    license: public_domain_or_us_gov
    access_method: download
    raw_storage_allowed: true
    structured_fields_available: true
    review_required: false
    display_authority: true
    allowed_outputs: [first]
    excluded_fields: [counts, sex, race, hispanic_origin, geography]
    retention:
      retain_raw_file: true
      persist_person_rows: false
      stream_only_fields: [name]
    notes: >-
      Census states the 2020 name release is summarized aggregate data and does not identify specific individuals.
      Use only first-name fields; discard all counts and demographic columns in public outputs.

